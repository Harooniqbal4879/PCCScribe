<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PCCScribe — Settings</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; color: #111827; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; color: #1d4ed8; }
    p.sub { color: #6b7280; font-size: 14px; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .hint { font-size: 12px; color: #9ca3af; margin-top: 6px; margin-bottom: 20px; }
    button { padding: 10px 24px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .status { margin-top: 14px; font-size: 13px; font-weight: 500; padding: 8px 12px; border-radius: 8px; display: none; }
    .status.success { background: #f0fdf4; color: #15803d; display: block; }
    .status.error { background: #fef2f2; color: #dc2626; display: block; }
  </style>
</head>
<body>
  <h1>PCCScribe Settings</h1>
  <p class="sub">Configure your PCCScribe connection</p>

  <label for="apiUrl">PCCScribe API URL</label>
  <input type="text" id="apiUrl" placeholder="https://your-app.replit.app/api" />
  <p class="hint">Find this on the Extension page in your PCCScribe web app.</p>

  <button id="save">Save Settings</button>
  <div class="status" id="status"></div>

  <script>
    chrome.storage.sync.get(['apiUrl'], r => {
      document.getElementById('apiUrl').value = r.apiUrl || '';
    });
    document.getElementById('save').addEventListener('click', () => {
      const url = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
      const status = document.getElementById('status');
      if (!url) { status.className = 'status error'; status.textContent = 'Please enter a URL.'; return; }
      chrome.storage.sync.set({ apiUrl: url }, () => {
        status.className = 'status success';
        status.textContent = '✓ Settings saved!';
      });
    });
  </script>
</body>
</html>
